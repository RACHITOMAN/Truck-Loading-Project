    background:white;

    font-size:14px;

    transition:all .2s;
}

.form-grid input:focus{

    outline:none;

}

textarea{

textarea:focus{

    box-shadow:

}

.action-buttons{
    margin-top:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.action-buttons button{

    padding:12px 18px;

    border:none;

    border-radius:8px;

    cursor:pointer;

    font-weight:600;

    transition:.2s;
}

.action-buttons button:hover{

    transform:translateY(-1px);
}

.action-buttons button.primary{
    background:#2563eb;
    color:white;
}
